<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAME//PULSE - 游戏偏好</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{background:#08111f}.choice input{position:absolute;opacity:0}.choice span{display:flex;justify-content:center;align-items:center;min-height:42px;border:1px solid #475569;background:#0f172a;color:#cbd5e1;cursor:pointer}.choice input:checked+span{border-color:#22d3ee;background:#164e63;color:#ecfeff}.choice:hover span{border-color:#67e8f9}.status{min-height:24px}
  </style>
</head>
<body class="min-h-screen text-slate-100">
  <main class="mx-auto max-w-5xl px-4 py-8 sm:py-12">
    <header class="mb-9 border-b border-cyan-400/30 pb-6"><p class="font-mono text-xs tracking-widest text-cyan-300">AI GAME RECOMMENDATION</p><h1 class="mt-2 text-3xl font-black">GAME<span class="text-cyan-400">//</span>PULSE</h1><p class="mt-3 text-sm text-slate-400">填写偏好，或导入公开的 Steam 资料后继续补充。</p></header>
    <section class="mb-8 border border-slate-700 bg-slate-950 p-5">
      <div class="flex flex-wrap items-end gap-3"><div class="min-w-64 flex-1"><label for="steamIdentifier" class="mb-2 block font-bold">导入 Steam 个人资料</label><input id="steamIdentifier" class="w-full border border-slate-600 bg-slate-900 px-3 py-3 outline-none focus:border-cyan-400" placeholder="SteamID、SteamID64、资料链接或自定义 ID"></div><button id="steamButton" type="button" class="border border-cyan-300 bg-cyan-400 px-5 py-3 font-bold text-slate-950 disabled:opacity-60">读取 Steam</button></div>
      <p id="steamStatus" class="status mt-3 text-sm text-slate-400" aria-live="polite">仅读取 Steam 公开资料；私密资料不会被保存。</p><pre id="steamResult" class="hidden mt-3 overflow-auto border-t border-slate-800 pt-3 text-xs text-cyan-100"></pre>
    </section>
    <form id="preferenceForm" class="space-y-7" novalidate>
      <section><div class="mb-3 flex gap-3"><h2 class="font-bold">游戏平台</h2><span class="text-xs text-pink-400">至少选一项</span></div><div class="grid grid-cols-2 gap-3 sm:grid-cols-5"><label class="choice"><input type="checkbox" name="platforms" value="PC"><span>PC</span></label><label class="choice"><input type="checkbox" name="platforms" value="Switch"><span>Switch</span></label><label class="choice"><input type="checkbox" name="platforms" value="PS5"><span>PS5</span></label><label class="choice"><input type="checkbox" name="platforms" value="Xbox"><span>Xbox</span></label><label class="choice"><input type="checkbox" name="platforms" value="手机"><span>手机</span></label></div></section>
      <section><div class="mb-3 flex gap-3"><h2 class="font-bold">游戏类型</h2><span class="text-xs text-pink-400">至少选一项</span></div><div class="grid grid-cols-2 gap-3 sm:grid-cols-4 lg:grid-cols-7"><label class="choice"><input type="checkbox" name="game_types" value="动作"><span>动作</span></label><label class="choice"><input type="checkbox" name="game_types" value="RPG"><span>RPG</span></label><label class="choice"><input type="checkbox" name="game_types" value="射击"><span>射击</span></label><label class="choice"><input type="checkbox" name="game_types" value="策略"><span>策略</span></label><label class="choice"><input type="checkbox" name="game_types" value="模拟经营"><span>模拟经营</span></label><label class="choice"><input type="checkbox" name="game_types" value="休闲"><span>休闲</span></label><label class="choice"><input type="checkbox" name="game_types" value="独立游戏"><span>独立游戏</span></label></div></section>
      <div class="grid gap-7 md:grid-cols-2">
        <section><h2 class="mb-3 font-bold">游玩人数</h2><div class="grid grid-cols-2 gap-3"><label class="choice"><input type="radio" name="player_mode" value="单人" checked><span>单人</span></label><label class="choice"><input type="radio" name="player_mode" value="本地多人"><span>本地多人</span></label><label class="choice"><input type="radio" name="player_mode" value="在线多人"><span>在线多人</span></label><label class="choice"><input type="radio" name="player_mode" value="MMO"><span>MMO</span></label></div></section>
        <section><h2 class="mb-3 font-bold">美术风格</h2><div class="grid grid-cols-2 gap-3"><label class="choice"><input type="checkbox" name="art_styles" value="写实"><span>写实</span></label><label class="choice"><input type="checkbox" name="art_styles" value="像素"><span>像素</span></label><label class="choice"><input type="checkbox" name="art_styles" value="二次元"><span>二次元</span></label><label class="choice"><input type="checkbox" name="art_styles" value="卡通渲染"><span>卡通渲染</span></label></div></section>
        <section><h2 class="mb-3 font-bold">时长偏好</h2><select name="duration_preference" class="w-full border border-slate-600 bg-slate-900 p-3"><option>短平快(&lt;10h)</option><option selected>适中(10-30h)</option><option>杀时间(30h+)</option><option>无限游玩</option></select></section>
        <section><h2 class="mb-3 font-bold">预算范围</h2><select name="budget" class="w-full border border-slate-600 bg-slate-900 p-3"><option>免费</option><option selected>100元内</option><option>100-300元</option><option>300元以上</option></select></section>
      </div>
      <section class="flex items-center justify-between border-y border-slate-700 py-5"><label for="chineseRequired" class="font-bold">必须支持中文</label><input id="chineseRequired" type="checkbox" class="h-5 w-5 accent-cyan-400"></section>
      <section><label for="notes" class="mb-2 block font-bold">补充说明</label><textarea id="notes" rows="4" maxlength="1000" class="w-full border border-slate-600 bg-slate-900 p-3 outline-none focus:border-cyan-400" placeholder="例如：想找适合与朋友一起玩的合作游戏"></textarea></section>
      <div class="flex flex-wrap items-center gap-4"><button id="submitButton" type="submit" class="border border-cyan-300 bg-cyan-400 px-6 py-3 font-bold text-slate-950 disabled:opacity-60">提交偏好</button><p id="formMessage" class="status text-sm text-slate-400" aria-live="polite"></p></div>
    </form><pre id="result" class="mt-8 min-h-24 overflow-auto border border-slate-700 bg-slate-950 p-4 text-xs text-cyan-100">等待提交偏好数据...</pre>
  </main>
  <script>
    const steamButton=document.querySelector('#steamButton'), steamInput=document.querySelector('#steamIdentifier'), steamStatus=document.querySelector('#steamStatus'), steamResult=document.querySelector('#steamResult'), form=document.querySelector('#preferenceForm'), submitButton=document.querySelector('#submitButton'), message=document.querySelector('#formMessage'), result=document.querySelector('#result'); let steamSummary=null;
    const selected=name=>[...document.querySelectorAll(`input[name="${name}"]:checked`)].map(input=>input.value);
    function applySteamSummary(data){if(data.visibility!=='public')return; const platforms=selected('platforms'); if(!platforms.includes('PC'))document.querySelector('input[name="platforms"][value="PC"]').checked=true; data.inferred_game_types.forEach(type=>{const input=document.querySelector(`input[name="game_types"][value="${type}"]`);if(input)input.checked=true}); if(data.suggested_player_mode)document.querySelector(`input[name="player_mode"][value="${data.suggested_player_mode}"]`).checked=true}
    steamButton.addEventListener('click',async()=>{const steam_identifier=steamInput.value.trim();if(!steam_identifier){steamStatus.textContent='请输入 Steam 标识后再读取。';steamStatus.className='status mt-3 text-sm text-pink-400';return}steamButton.disabled=true;steamStatus.textContent='正在读取 Steam 公开资料...';steamStatus.className='status mt-3 text-sm text-cyan-300';try{const res=await fetch('/api/steam/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({steam_identifier})});const data=await res.json();if(!res.ok)throw new Error(data.detail||'读取失败');steamSummary=data;const fallback=data.visibility==='public'&&data.game_count===0?' 可继续手动填写偏好。':'';steamStatus.textContent=data.message+fallback;steamStatus.className=`status mt-3 text-sm ${data.visibility==='public'?'text-emerald-300':'text-amber-300'}`;steamResult.textContent=JSON.stringify(data,null,2);steamResult.classList.remove('hidden');applySteamSummary(data)}catch(error){steamSummary=null;steamStatus.textContent=`${error.message}。你仍可手动填写偏好。`;steamStatus.className='status mt-3 text-sm text-pink-400'}finally{steamButton.disabled=false}});
    form.addEventListener('submit',async event=>{event.preventDefault();const platforms=selected('platforms'),game_types=selected('game_types');if(!platforms.length||!game_types.length){message.textContent='请至少选择一个游戏平台和一种游戏类型。';message.className='status text-sm text-pink-400';return}const payload={platforms,game_types,player_mode:document.querySelector('input[name="player_mode"]:checked').value,art_styles:selected('art_styles'),duration_preference:form.elements.duration_preference.value,budget:form.elements.budget.value,chinese_required:document.querySelector('#chineseRequired').checked,notes:document.querySelector('#notes').value.trim()||null,steam_summary:steamSummary?.visibility==='public'?steamSummary:null};submitButton.disabled=true;message.textContent='正在提交偏好...';message.className='status text-sm text-cyan-300';try{const res=await fetch('/api/preferences/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json();result.textContent=JSON.stringify(data,null,2);if(!res.ok)throw new Error(JSON.stringify(data.detail||data));message.textContent='偏好已提交，可供推荐模块使用。';message.className='status text-sm text-emerald-300'}catch(error){message.textContent=`提交失败：${error.message}`;message.className='status text-sm text-pink-400'}finally{submitButton.disabled=false}});
  </script>
</body></html>
