<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070b16">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%228%22 fill=%22%23070b16%22/><path d=%22M13 43 32 12l19 31-19-9-19 9Z%22 fill=%22%2338e8ff%22/><path d=%22m23 43 9-9 9 9-9 9-9-9Z%22 fill=%22%23ff4d9d%22/></svg>">
  <title>GameData Catalogue</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b16;
      --surface: #101827;
      --surface-raised: #142033;
      --surface-strong: #1a2a40;
      --border: #29445a;
      --border-strong: #3c6b85;
      --text: #f2f7fc;
      --muted: #a7b6c7;
      --cyan: #38e8ff;
      --cyan-soft: #9af3ff;
      --magenta: #ff4d9d;
      --yellow: #ffd166;
      --success: #69f0ae;
      --danger: #ff7b7b;
      --radius: 8px;
      --shadow: 0 16px 36px rgba(0, 0, 0, .28);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body { min-width: 320px; margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; }
    a { color: inherit; }
    .skip-link { position: fixed; top: 8px; left: 8px; z-index: 100; padding: 10px 14px; background: var(--cyan); color: #061019; transform: translateY(-160%); }
    .skip-link:focus { transform: translateY(0); }
    .site-header { border-bottom: 1px solid var(--border); background: #0a1120; }
    .header-inner, main { width: min(1440px, calc(100% - 32px)); margin: 0 auto; }
    .header-inner { display: flex; min-height: 86px; align-items: center; justify-content: space-between; gap: 24px; }
    .brand-kicker { color: var(--cyan); font-family: Consolas, monospace; font-size: 12px; font-weight: 700; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 2px; font-size: 32px; line-height: 1.15; }
    .header-copy { margin: 0; color: var(--muted); font-size: 14px; }
    .service-state { display: flex; align-items: center; gap: 9px; color: var(--muted); font-family: Consolas, monospace; font-size: 12px; white-space: nowrap; }
    .state-dot { width: 10px; height: 10px; border: 2px solid var(--cyan); border-radius: 50%; }
    .state-dot.is-ready { background: var(--success); border-color: var(--success); }
    main { padding: 28px 0 52px; }
    .overview { margin-bottom: 22px; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .metric { min-height: 104px; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); }
    .metric-label { color: var(--muted); font-size: 13px; }
    .metric-value { margin-top: 9px; color: var(--text); font-family: Consolas, "Microsoft YaHei UI", monospace; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .metric-value.is-accent { color: var(--cyan); }
    .filter-panel { padding: 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
    .filter-panel h2 { margin-bottom: 3px; font-size: 17px; }
    .section-note { margin-bottom: 14px; color: var(--muted); font-size: 13px; }
    .filter-form { display: grid; grid-template-columns: minmax(220px, 1.6fr) repeat(4, minmax(132px, 1fr)) auto; gap: 10px; }
    .control { width: 100%; min-height: 44px; border: 1px solid var(--border-strong); border-radius: 5px; background: #0a1322; color: var(--text); padding: 0 12px; }
    .control::placeholder { color: #8192a4; }
    .control:focus-visible, .action-button:focus-visible, .game-card:focus-visible { outline: 3px solid var(--cyan); outline-offset: 2px; }
    .action-button { min-height: 44px; border: 1px solid transparent; border-radius: 5px; padding: 0 16px; font-weight: 700; transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease, transform 180ms ease; }
    .action-button:active { transform: scale(.98); }
    .action-button.primary { background: var(--cyan); color: #061019; }
    .action-button.primary:hover { background: var(--cyan-soft); }
    .action-button.secondary { border-color: var(--border-strong); background: transparent; color: var(--text); }
    .action-button.secondary:hover { border-color: var(--cyan); color: var(--cyan); }
    .catalog-layout { display: grid; grid-template-columns: minmax(0, 1fr) 350px; align-items: start; gap: 20px; }
    .catalog-column, .detail-panel { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); }
    .catalog-toolbar { display: flex; align-items: end; justify-content: space-between; gap: 16px; padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
    .catalog-toolbar h2, .detail-header h2 { margin-bottom: 2px; font-size: 18px; }
    .catalog-toolbar p, .detail-header p { margin: 0; color: var(--muted); font-size: 13px; }
    .result-count { color: var(--cyan); font-family: Consolas, monospace; font-size: 13px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; padding: 18px; }
    .card-item { min-width: 0; }
    .game-card { display: block; width: 100%; min-width: 0; overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-raised); color: inherit; padding: 0; text-align: left; transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease; }
    .game-card:hover { border-color: var(--cyan); box-shadow: 0 10px 26px rgba(0, 229, 255, .15); transform: translateY(-2px); }
    .game-card[aria-pressed="true"] { border-color: var(--magenta); box-shadow: 0 0 0 1px var(--magenta), 0 10px 26px rgba(255, 77, 157, .15); }
    .cover-frame { position: relative; aspect-ratio: 16 / 9; overflow: hidden; background: #09111d; }
    .cover-frame img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .cover-source { position: absolute; top: 8px; right: 8px; padding: 3px 6px; border: 1px solid rgba(255, 255, 255, .24); background: rgba(7, 11, 22, .78); color: #eef7ff; font-family: Consolas, monospace; font-size: 10px; }
    .card-body { padding: 12px; }
    .card-topline { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--cyan); font-size: 12px; }
    .rating { color: var(--yellow); font-family: Consolas, monospace; font-weight: 700; font-variant-numeric: tabular-nums; }
    .game-name { overflow: hidden; display: -webkit-box; margin: 7px 0 4px; color: var(--text); font-size: 16px; line-height: 1.35; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    .card-meta { overflow: hidden; color: var(--muted); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .tag-list { display: flex; min-height: 25px; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag { max-width: 100%; overflow: hidden; border: 1px solid #335268; border-radius: 3px; color: #c4d9e8; padding: 2px 6px; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .load-area { display: grid; justify-items: center; gap: 10px; padding: 0 18px 22px; }
    .load-status { min-height: 20px; margin: 0; color: var(--muted); font-size: 13px; text-align: center; }
    .load-status.is-error { color: var(--danger); }
    .sentinel { width: 100%; height: 1px; }
    .detail-panel { position: sticky; top: 18px; min-height: 360px; }
    .detail-header { padding: 18px; border-bottom: 1px solid var(--border); }
    .detail-content { padding: 18px; }
    .empty-state { display: grid; min-height: 250px; place-items: center; color: var(--muted); text-align: center; }
    .detail-cover { overflow: hidden; margin: -18px -18px 16px; border-bottom: 1px solid var(--border); }
    .detail-cover img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
    .detail-title { margin-bottom: 4px; color: var(--text); font-size: 23px; line-height: 1.2; }
    .detail-subtitle { margin-bottom: 14px; color: var(--cyan); font-size: 14px; }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 17px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .detail-item span { display: block; color: var(--muted); font-size: 12px; }
    .detail-item strong { display: block; margin-top: 2px; color: var(--text); font-size: 14px; overflow-wrap: anywhere; }
    .review-title { margin: 18px 0 9px; font-size: 14px; }
    .review-row { display: grid; grid-template-columns: 42px 1fr 36px; align-items: center; gap: 8px; margin: 7px 0; color: var(--muted); font-size: 12px; }
    .review-track { height: 7px; overflow: hidden; background: #0a1322; }
    .review-fill { display: block; height: 100%; }
    .review-fill.good { background: var(--success); }
    .review-fill.medium { background: var(--cyan); }
    .review-fill.poor { background: var(--magenta); }
    .description { margin: 18px 0 0; color: #d4dfeb; font-size: 14px; line-height: 1.7; }
    .detail-message { margin: 0 0 12px; color: var(--yellow); font-size: 12px; }
    .skeleton { overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-raised); }
    .skeleton-cover { aspect-ratio: 16 / 9; background: #162337; }
    .skeleton-line { height: 12px; margin: 12px; background: #1d3045; }
    .skeleton-line.short { width: 54%; }
    .catalog-empty { grid-column: 1 / -1; display: grid; min-height: 230px; align-content: center; justify-items: center; gap: 14px; padding: 28px; color: var(--muted); text-align: center; }
    .catalog-empty h3 { margin: 0 0 5px; color: var(--text); font-size: 18px; }
    .catalog-empty p { max-width: 460px; margin: 0; font-size: 13px; }
    @media (max-width: 1160px) { .filter-form { grid-template-columns: minmax(220px, 1.4fr) repeat(3, minmax(132px, 1fr)); } .filter-form .action-button { grid-column: span 1; } .catalog-layout { grid-template-columns: minmax(0, 1fr) 310px; } }
    @media (max-width: 940px) { .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .filter-form { grid-template-columns: repeat(2, minmax(0, 1fr)); } .filter-form .keyword { grid-column: span 2; } .catalog-layout { grid-template-columns: 1fr; } .detail-panel { position: static; order: -1; min-height: 0; } .empty-state { min-height: 140px; } }
    @media (max-width: 620px) { .header-inner, main { width: min(100% - 24px, 1440px); } .header-inner { min-height: 96px; align-items: flex-start; flex-direction: column; justify-content: center; gap: 6px; } h1 { font-size: 24px; } .service-state { padding-bottom: 2px; } main { padding-top: 14px; } .overview { margin-bottom: 14px; } .metric-grid { gap: 8px; margin-bottom: 10px; } .metric { min-height: 72px; padding: 10px; } .metric-value { margin-top: 4px; font-size: 21px; } .filter-panel { padding: 12px; } .section-note { margin-bottom: 10px; } .filter-form { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; } .filter-form .keyword { grid-column: 1 / -1; } .filter-form .action-button { width: 100%; } .catalog-layout { gap: 14px; } .catalog-toolbar { align-items: flex-start; flex-direction: column; gap: 6px; padding: 14px 12px 10px; } .game-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; padding: 12px; } .card-body { padding: 9px; } .game-name { font-size: 14px; } .cover-source { display: none; } .detail-panel { order: 0; } .detail-content, .detail-header { padding: 14px; } .detail-cover { margin: -14px -14px 14px; } .catalog-empty { min-height: 190px; padding: 22px 12px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#catalogue">跳到游戏目录</a>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <div class="brand-kicker">GAMEDATA / CATALOGUE</div>
        <h1>游戏数据目录</h1>
        <p class="header-copy">跨平台游戏档案、价格与玩家评分。</p>
      </div>
      <div class="service-state" aria-live="polite"><span id="serviceDot" class="state-dot"></span><span id="serviceStatus">连接本地数据服务</span></div>
    </div>
  </header>

  <main id="main-content">
    <section class="overview" aria-labelledby="filterHeading">
      <div class="metric-grid">
        <article class="metric"><div class="metric-label">匹配游戏</div><div id="totalMetric" class="metric-value is-accent">--</div></article>
        <article class="metric"><div class="metric-label">已加载</div><div id="loadedMetric" class="metric-value">0</div></article>
        <article class="metric"><div class="metric-label">已加载平均评分</div><div id="averageMetric" class="metric-value">--</div></article>
        <article class="metric"><div class="metric-label">当前筛选</div><div id="filterMetric" class="metric-value">全部</div></article>
      </div>
      <div class="filter-panel">
        <h2 id="filterHeading">浏览游戏</h2>
        <p class="section-note">按类型、平台与标签缩小结果范围。</p>
        <form id="filterForm" class="filter-form">
          <input id="keywordFilter" class="control keyword" name="keyword" type="search" autocomplete="off" placeholder="搜索名称、类型、标签或简介">
          <select id="genreFilter" class="control" name="genre" aria-label="按游戏类型筛选"></select>
          <select id="platformFilter" class="control" name="platform" aria-label="按游戏平台筛选"></select>
          <select id="tagFilter" class="control" name="tag" aria-label="按标签筛选"></select>
          <select id="sortFilter" class="control" name="sort" aria-label="排序方式">
            <option value="rating">评分最高</option>
            <option value="release_desc">最新发售</option>
            <option value="price_asc">价格最低</option>
            <option value="name">名称排序</option>
          </select>
          <button class="action-button primary" type="submit">应用筛选</button>
          <button id="clearFilters" class="action-button secondary" type="button">清除</button>
        </form>
      </div>
    </section>

    <section class="catalog-layout" aria-label="游戏目录和详情">
      <div id="catalogue" class="catalog-column" tabindex="-1">
        <div class="catalog-toolbar">
          <div><h2>游戏目录</h2><p>当前目录中的游戏与发行信息。</p></div>
          <div id="resultCount" class="result-count">正在载入</div>
        </div>
        <div id="gameGrid" class="game-grid" role="list" aria-busy="true"></div>
        <div id="scrollSentinel" class="sentinel" aria-hidden="true"></div>
        <div class="load-area">
          <button id="loadMore" class="action-button secondary" type="button">加载更多游戏</button>
          <p id="loadStatus" class="load-status" aria-live="polite"></p>
        </div>
      </div>
      <aside class="detail-panel" aria-labelledby="detailHeading">
        <div class="detail-header"><h2 id="detailHeading">游戏详情</h2><p id="detailSubtitle">从目录选择一款游戏</p></div>
        <div id="detailContent" class="detail-content"><div class="empty-state">尚未选择游戏。</div></div>
      </aside>
    </section>
  </main>

  <script>
    const PAGE_SIZE = 12;
    const elements = {
      form: document.querySelector('#filterForm'),
      keyword: document.querySelector('#keywordFilter'),
      genre: document.querySelector('#genreFilter'),
      platform: document.querySelector('#platformFilter'),
      tag: document.querySelector('#tagFilter'),
      sort: document.querySelector('#sortFilter'),
      clear: document.querySelector('#clearFilters'),
      grid: document.querySelector('#gameGrid'),
      loadMore: document.querySelector('#loadMore'),
      loadStatus: document.querySelector('#loadStatus'),
      sentinel: document.querySelector('#scrollSentinel'),
      resultCount: document.querySelector('#resultCount'),
      totalMetric: document.querySelector('#totalMetric'),
      loadedMetric: document.querySelector('#loadedMetric'),
      averageMetric: document.querySelector('#averageMetric'),
      filterMetric: document.querySelector('#filterMetric'),
      serviceDot: document.querySelector('#serviceDot'),
      serviceStatus: document.querySelector('#serviceStatus'),
      detailSubtitle: document.querySelector('#detailSubtitle'),
      detailContent: document.querySelector('#detailContent')
    };

    const state = {
      items: [],
      page: 0,
      total: 0,
      hasMore: true,
      loading: false,
      loadError: '',
      requestVersion: 0,
      selectionVersion: 0,
      selectedId: null,
      selectedGame: null
    };

    const initialQuery = new URLSearchParams(window.location.search);
    let searchTimer;
    let listObserver;
    let infiniteLoadingEnabled = false;

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, character => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[character]);
    }

    function priceText(price) {
      return Number(price) === 0 ? '免费' : `¥${Number(price).toFixed(0)}`;
    }

    function formatPlatforms(platforms) {
      return Array.isArray(platforms) ? platforms.join(' / ') : '';
    }

    function coverFallbackUrl(game) {
      return game.cover?.fallback_url || `/api/games/${encodeURIComponent(game.id)}/cover.svg`;
    }

    function attachCover(image, game) {
      const fallbackUrl = coverFallbackUrl(game);
      image.src = fallbackUrl;
      image.alt = `${game.name} 游戏封面`;
      image.decoding = 'async';
      if ('loading' in HTMLImageElement.prototype) image.loading = 'lazy';
      const remoteUrl = game.cover?.url;
      if (!remoteUrl) return;

      // Preload the remote image before replacing the local fallback. This
      // keeps every card intact when Steam is blocked or the user is offline.
      const remoteImage = new Image();
      remoteImage.onload = () => {
        if (image.isConnected) image.src = remoteImage.src;
      };
      remoteImage.src = remoteUrl;
    }

    function createCover(game, className = 'cover-frame') {
      const frame = document.createElement('div');
      frame.className = className;
      const image = document.createElement('img');
      attachCover(image, game);
      frame.append(image);
      if (className === 'cover-frame') {
        const source = document.createElement('span');
        source.className = 'cover-source';
        source.textContent = game.cover?.source === 'steam' ? 'STEAM' : 'LOCAL';
        frame.append(source);
      }
      return frame;
    }

    function tagMarkup(tags, maximum = 3) {
      return (tags || []).slice(0, maximum).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
    }

    function cardMarkup(game) {
      return `<article class="card-item" role="listitem"><button class="game-card" type="button" data-game-id="${escapeHtml(game.id)}" aria-pressed="${state.selectedId === game.id}">
        <div class="cover-frame" data-cover-for="${escapeHtml(game.id)}"></div>
        <div class="card-body">
          <div class="card-topline"><span>${escapeHtml(game.genre)}</span><span class="rating">${Number(game.rating).toFixed(1)}</span></div>
          <h3 class="game-name">${escapeHtml(game.name)}</h3>
          <div class="card-meta">${escapeHtml(priceText(game.price))} · ${escapeHtml(formatPlatforms(game.platforms))}</div>
          <div class="tag-list">${tagMarkup(game.tags)}</div>
        </div>
      </button></article>`;
    }

    function skeletonMarkup(count = 8) {
      return Array.from({ length: count }, () => '<div class="skeleton" aria-hidden="true"><div class="skeleton-cover"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>').join('');
    }

    function renderCards() {
      if (!state.items.length) {
        elements.grid.setAttribute('role', 'region');
        elements.grid.setAttribute('aria-labelledby', 'emptyCatalogueTitle');
        elements.grid.innerHTML = `<section class="catalog-empty">
          <div role="status"><h3 id="emptyCatalogueTitle">没有找到匹配游戏</h3><p>当前条件没有结果，可以清除筛选后重新浏览完整目录。</p></div>
          <button class="action-button secondary" type="button" data-clear-filters>清除筛选</button>
        </section>`;
        return;
      }
      elements.grid.setAttribute('role', 'list');
      elements.grid.removeAttribute('aria-labelledby');
      elements.grid.innerHTML = state.items.map(cardMarkup).join('');
      state.items.forEach(game => {
        const frame = elements.grid.querySelector(`[data-cover-for="${game.id}"]`);
        if (frame) frame.replaceWith(createCover(game));
      });
    }

    function renderMetrics() {
      const loadedAverage = state.items.length
        ? (state.items.reduce((sum, game) => sum + Number(game.rating), 0) / state.items.length).toFixed(1)
        : '--';
      const filters = getFilters();
      const selectedFilterCount = ['keyword', 'genre', 'platform', 'tag'].filter(key => filters[key]).length;
      elements.totalMetric.textContent = state.total || (state.loading ? '--' : '0');
      elements.loadedMetric.textContent = state.items.length;
      elements.averageMetric.textContent = loadedAverage;
      elements.filterMetric.textContent = selectedFilterCount ? `${selectedFilterCount} 项` : '全部';
      elements.resultCount.textContent = state.loading && !state.items.length
        ? '正在加载目录'
        : `已显示 ${state.items.length} / ${state.total}`;
    }

    function renderLoadState(message = state.loadError || '', isError = Boolean(state.loadError)) {
      elements.grid.setAttribute('aria-busy', String(state.loading));
      elements.loadStatus.textContent = message || (state.loading ? '正在加载游戏…' : state.hasMore ? `已加载 ${state.items.length} 款游戏。` : state.items.length ? '已显示全部匹配游戏。' : '未找到匹配游戏。');
      elements.loadStatus.classList.toggle('is-error', isError);
      elements.loadMore.hidden = !state.hasMore && !isError;
      elements.loadMore.disabled = state.loading;
      elements.loadMore.textContent = isError ? '重试加载' : state.loading ? '加载中…' : '加载更多游戏';
    }

    function getFilters() {
      return {
        keyword: elements.keyword.value.trim(),
        genre: elements.genre.value,
        platform: elements.platform.value,
        tag: elements.tag.value,
        sort: elements.sort.value || 'rating'
      };
    }

    function updateLocation() {
      const params = new URLSearchParams();
      const filters = getFilters();
      Object.entries(filters).forEach(([key, value]) => {
        if (value && !(key === 'sort' && value === 'rating')) params.set(key, value);
      });
      if (state.selectedId) params.set('game', state.selectedId);
      const query = params.toString();
      window.history.replaceState({}, '', `${window.location.pathname}${query ? `?${query}` : ''}`);
    }

    function populateSelect(element, values, label, selected) {
      element.innerHTML = `<option value="">${label}</option>${values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join('')}`;
      element.value = values.includes(selected) ? selected : '';
    }

    async function loadFilterOptions() {
      const response = await fetch('/api/games/options', { headers: { Accept: 'application/json' } });
      if (!response.ok) throw new Error('筛选项请求失败');
      const payload = await response.json();
      if (payload.code !== 0) throw new Error(payload.message || '筛选项请求失败');
      const data = payload.data;
      populateSelect(elements.genre, data.genres || [], '全部类型', initialQuery.get('genre') || '');
      populateSelect(elements.platform, data.platforms || [], '全部平台', initialQuery.get('platform') || '');
      populateSelect(elements.tag, data.tags || [], '全部标签', initialQuery.get('tag') || '');
      elements.keyword.value = initialQuery.get('keyword') || '';
      elements.sort.value = initialQuery.get('sort') || 'rating';
    }

    async function loadNextPage() {
      if (state.loading || !state.hasMore) return;
      const version = state.requestVersion;
      state.loading = true;
      state.loadError = '';
      renderLoadState();
      const filters = getFilters();
      const params = new URLSearchParams({ ...filters, page: String(state.page + 1), size: String(PAGE_SIZE) });
      Object.keys(filters).forEach(key => { if (!filters[key]) params.delete(key); });
      try {
        const response = await fetch(`/api/games?${params.toString()}`, { headers: { Accept: 'application/json' } });
        if (!response.ok) throw new Error(`游戏目录请求失败 (${response.status})`);
        const payload = await response.json();
        if (payload.code !== 0) throw new Error(payload.message || '游戏目录请求失败');
        if (version !== state.requestVersion) return;
        const data = payload.data;
        const loadedIds = new Set(state.items.map(game => game.id));
        state.items.push(...(data.items || []).filter(game => !loadedIds.has(game.id)));
        state.page = Number(data.page) || state.page + 1;
        state.total = Number(data.total) || 0;
        state.hasMore = Boolean(data.has_more);
        state.loadError = '';
        renderCards();
        renderMetrics();
        renderLoadState();
      } catch (error) {
        if (version !== state.requestVersion) return;
        if (!state.items.length) {
          elements.grid.innerHTML = '<div class="empty-state">无法加载游戏目录。请确认本地服务已启动后重试。</div>';
        }
        state.loadError = error.message;
        renderLoadState();
      } finally {
        if (version === state.requestVersion) {
          state.loading = false;
          renderMetrics();
          renderLoadState();
        }
      }
    }

    function resetCatalogue() {
      state.requestVersion += 1;
      state.items = [];
      state.page = 0;
      state.total = 0;
      state.hasMore = true;
      state.loading = false;
      state.loadError = '';
      elements.grid.setAttribute('role', 'list');
      elements.grid.removeAttribute('aria-labelledby');
      elements.grid.innerHTML = skeletonMarkup();
      renderMetrics();
      renderLoadState('正在更新游戏目录…');
      updateLocation();
      return loadNextPage();
    }

    function reviewRow(label, value, className) {
      const safeValue = Math.max(0, Math.min(100, Number(value) || 0));
      return `<div class="review-row"><span>${label}</span><span class="review-track"><span class="review-fill ${className}" style="width:${safeValue}%"></span></span><strong>${safeValue}%</strong></div>`;
    }

    function renderDetail(game, options = {}) {
      if (!game) {
        elements.detailSubtitle.textContent = '从目录选择一款游戏';
        elements.detailContent.innerHTML = '<div class="empty-state">尚未选择游戏。</div>';
        return;
      }
      elements.detailSubtitle.textContent = options.loading ? '正在获取完整数据…' : `已选择：${game.name}`;
      const reviews = game.review_distribution || {};
      elements.detailContent.innerHTML = `
        <div class="detail-cover" data-detail-cover></div>
        ${options.message ? `<p class="detail-message">${escapeHtml(options.message)}</p>` : ''}
        <h3 class="detail-title">${escapeHtml(game.name)}</h3>
        <p class="detail-subtitle">${escapeHtml(game.genre)} · ${escapeHtml(priceText(game.price))} · 评分 ${Number(game.rating).toFixed(1)}</p>
        <div class="detail-tags">${tagMarkup(game.tags, 8)}</div>
        <div class="detail-grid">
          <div class="detail-item"><span>游戏平台</span><strong>${escapeHtml(formatPlatforms(game.platforms))}</strong></div>
          <div class="detail-item"><span>开发商</span><strong>${escapeHtml(game.developer)}</strong></div>
          <div class="detail-item"><span>发售日期</span><strong>${escapeHtml(game.release_date)}</strong></div>
          <div class="detail-item"><span>封面来源</span><strong>${game.cover?.source === 'steam' ? 'Steam' : '本地生成'}</strong></div>
        </div>
        <h3 class="review-title">玩家评价</h3>
        ${reviewRow('好评', reviews.good, 'good')}
        ${reviewRow('中等', reviews.medium, 'medium')}
        ${reviewRow('差评', reviews.poor, 'poor')}
        <p class="description">${escapeHtml(game.description)}</p>`;
      const frame = elements.detailContent.querySelector('[data-detail-cover]');
      if (frame) frame.replaceWith(createCover(game, 'detail-cover'));
    }

    function refreshSelection() {
      elements.grid.querySelectorAll('[data-game-id]').forEach(card => {
        card.setAttribute('aria-pressed', String(card.dataset.gameId === state.selectedId));
      });
    }

    async function selectGame(game) {
      if (!game) return;
      state.selectedId = game.id;
      state.selectedGame = game;
      const selectionVersion = ++state.selectionVersion;
      refreshSelection();
      renderDetail(game, { loading: true });
      updateLocation();
      try {
        const response = await fetch(`/api/games/${encodeURIComponent(game.id)}`, { headers: { Accept: 'application/json' } });
        if (!response.ok) throw new Error('游戏详情请求失败');
        const payload = await response.json();
        if (payload.code !== 0) throw new Error(payload.message || '游戏详情请求失败');
        if (selectionVersion !== state.selectionVersion) return;
        state.selectedGame = payload.data;
        renderDetail(state.selectedGame);
      } catch (error) {
        if (selectionVersion !== state.selectionVersion) return;
        renderDetail(game, { message: '完整详情暂不可用，正在显示目录中的游戏数据。' });
      }
    }

    function setServiceReady() {
      elements.serviceDot.classList.add('is-ready');
      elements.serviceStatus.textContent = '本地数据服务已连接';
    }

    function clearFilters() {
      window.clearTimeout(searchTimer);
      elements.keyword.value = '';
      elements.genre.value = '';
      elements.platform.value = '';
      elements.tag.value = '';
      elements.sort.value = 'rating';
      state.selectedId = null;
      state.selectedGame = null;
      renderDetail(null);
      resetCatalogue();
    }

    function setupInteractions() {
      elements.form.addEventListener('submit', event => { event.preventDefault(); resetCatalogue(); });
      elements.clear.addEventListener('click', clearFilters);
      elements.keyword.addEventListener('input', () => {
        window.clearTimeout(searchTimer);
        searchTimer = window.setTimeout(resetCatalogue, 320);
      });
      [elements.genre, elements.platform, elements.tag, elements.sort].forEach(element => {
        element.addEventListener('change', resetCatalogue);
      });
      elements.loadMore.addEventListener('click', loadNextPage);
      elements.grid.addEventListener('click', event => {
        if (event.target.closest('[data-clear-filters]')) {
          clearFilters();
          return;
        }
        const card = event.target.closest('[data-game-id]');
        if (!card) return;
        selectGame(state.items.find(game => game.id === card.dataset.gameId));
      });
      if ('IntersectionObserver' in window) {
        listObserver = new IntersectionObserver(entries => {
          if (entries.some(entry => entry.isIntersecting)) loadNextPage();
        }, { rootMargin: '360px 0px' });
        window.addEventListener('scroll', () => {
          if (infiniteLoadingEnabled) return;
          infiniteLoadingEnabled = true;
          listObserver.observe(elements.sentinel);
        }, { once: true, passive: true });
      }
    }

    async function bootstrap() {
      setupInteractions();
      try {
        await loadFilterOptions();
        setServiceReady();
        await resetCatalogue();
        const initialGameId = initialQuery.get('game');
        if (initialGameId) {
          const game = state.items.find(item => item.id === initialGameId);
          if (game) selectGame(game);
          else {
            const response = await fetch(`/api/games/${encodeURIComponent(initialGameId)}`);
            const payload = await response.json();
            if (response.ok && payload.code === 0) selectGame(payload.data);
          }
        }
      } catch (error) {
        elements.serviceStatus.textContent = '无法连接本地数据服务';
        elements.grid.innerHTML = '<div class="empty-state">无法载入筛选项。请通过 main.py 或 start.bat 启动本模块。</div>';
        renderLoadState(error.message, true);
      }
    }

    bootstrap();
  </script>
</body>
</html>
