<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成员4 - AI 推荐设置</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --surface: #ffffff;
        --text: #172033;
        --muted: #667085;
        --line: #d8deea;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #b42318;
        --ok: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .wrap {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
      }

      header .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 64px;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      main {
        padding: 28px 0 44px;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
        align-items: start;
      }

      section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: var(--muted);
        font-size: 14px;
      }

      input,
      textarea,
      select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 11px;
        color: var(--text);
        font: inherit;
        background: #fff;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: var(--primary);
        color: #fff;
      }

      .primary:hover {
        background: var(--primary-dark);
      }

      .secondary {
        background: #fff;
        border-color: var(--line);
        color: var(--text);
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: var(--muted);
        line-height: 1.6;
        overflow-wrap: anywhere;
      }

      .error {
        color: var(--danger);
      }

      .ok {
        color: var(--ok);
      }

      .results {
        display: grid;
        gap: 12px;
      }

      .result-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fbfcff;
      }

      .result-item h3 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 820px) {
        .grid,
        .row {
          grid-template-columns: 1fr;
        }

        header .wrap {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1>成员4：AI 推荐模块</h1>
        <span id="keyPreview" class="meta">未设置用户 API Key</span>
      </div>
    </header>

    <main class="wrap">
      <div class="grid">
        <section>
          <h2>API Key 设置</h2>
          <label for="apiKey">用户 API Key</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="输入自己的 API Key" />
          <div class="actions">
            <button class="primary" id="saveKey">保存</button>
            <button class="secondary" id="clearKey">清除</button>
            <button class="secondary" id="checkKey">检查</button>
          </div>
          <div id="keyStatus" class="status"></div>
        </section>

        <section>
          <h2>生成推荐</h2>
          <div class="row">
            <div>
              <label for="genres">喜欢的类型</label>
              <input id="genres" value="动作, Roguelike" />
            </div>
            <div>
              <label for="platforms">平台</label>
              <input id="platforms" value="PC, Switch" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="budget">预算</label>
              <input id="budget" value="200 元以内" />
            </div>
            <div>
              <label for="playerMode">游玩人数</label>
              <select id="playerMode">
                <option>单人</option>
                <option>多人</option>
                <option>双人合作</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div>
              <label for="artStyle">画风偏好</label>
              <input id="artStyle" value="精致、节奏感强" />
            </div>
            <div>
              <label for="playTime">游玩时长</label>
              <input id="playTime" value="每次 30 分钟左右" />
            </div>
          </div>
          <label for="extra">其他需求</label>
          <textarea id="extra">希望支持中文，失败后还能继续挑战。</textarea>
          <div class="actions">
            <button class="primary" id="generate">生成推荐</button>
          </div>
          <div id="recommendStatus" class="status"></div>
          <div id="results" class="results"></div>
        </section>
      </div>
    </main>

    <script>
      const storageKey = "member4_ai_api_key";
      const keyInput = document.querySelector("#apiKey");
      const keyPreview = document.querySelector("#keyPreview");
      const keyStatus = document.querySelector("#keyStatus");
      const recommendStatus = document.querySelector("#recommendStatus");
      const results = document.querySelector("#results");

      function splitList(value) {
        return value
          .split(/[,，]/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function maskKey(key) {
        if (!key) return "未设置用户 API Key";
        if (key.length <= 8) return "*".repeat(key.length);
        return `${key.slice(0, 3)}****${key.slice(-4)}`;
      }

      function getStoredKey() {
        return sessionStorage.getItem(storageKey) || "";
      }

      function refreshKeyPreview() {
        const key = getStoredKey();
        keyPreview.textContent = key ? `当前用户 Key：${maskKey(key)}` : "未设置用户 API Key";
      }

      async function checkKey() {
        keyStatus.textContent = "检查中...";
        keyStatus.className = "status";
        const apiKey = keyInput.value.trim() || getStoredKey();
        const response = await fetch("/api/key/check", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ apiKey }),
        });
        const payload = await response.json();
        const data = payload.data;
        keyStatus.className = `status ${data.activeSource === "none" ? "error" : "ok"}`;
        keyStatus.textContent = `当前来源：${data.activeSource}；用户 Key：${data.maskedUserKey || "无"}；默认 Key 已配置：${data.defaultKeyConfigured ? "是" : "否"}`;
      }

      document.querySelector("#saveKey").addEventListener("click", () => {
        const key = keyInput.value.trim();
        if (!key) {
          keyStatus.className = "status error";
          keyStatus.textContent = "请输入 API Key。";
          return;
        }
        sessionStorage.setItem(storageKey, key);
        keyInput.value = "";
        keyStatus.className = "status ok";
        keyStatus.textContent = `已保存：${maskKey(key)}`;
        refreshKeyPreview();
      });

      document.querySelector("#clearKey").addEventListener("click", () => {
        sessionStorage.removeItem(storageKey);
        keyInput.value = "";
        keyStatus.className = "status";
        keyStatus.textContent = "已清除本浏览器会话中的用户 Key。";
        refreshKeyPreview();
      });

      document.querySelector("#checkKey").addEventListener("click", checkKey);

      document.querySelector("#generate").addEventListener("click", async () => {
        recommendStatus.className = "status";
        recommendStatus.textContent = "推荐生成中...";
        results.innerHTML = "";

        const body = {
          preferences: {
            genres: splitList(document.querySelector("#genres").value),
            platforms: splitList(document.querySelector("#platforms").value),
            budget: document.querySelector("#budget").value,
            player_mode: document.querySelector("#playerMode").value,
            art_style: document.querySelector("#artStyle").value,
            play_time: document.querySelector("#playTime").value,
            chinese_support: true,
            extra_requirements: document.querySelector("#extra").value,
          },
          limit: 5,
        };

        const headers = { "Content-Type": "application/json" };
        const apiKey = getStoredKey();
        if (apiKey) headers["x-ai-api-key"] = apiKey;

        try {
          const response = await fetch("/api/recommend", {
            method: "POST",
            headers,
            body: JSON.stringify(body),
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "推荐失败");
          recommendStatus.className = "status ok";
          recommendStatus.textContent = `推荐完成，来源：${payload.meta.source}${payload.meta.demo_mode ? "（演示模式）" : ""}`;
          results.innerHTML = payload.data.map(renderItem).join("");
        } catch (error) {
          recommendStatus.className = "status error";
          recommendStatus.textContent = error.message;
        }
      });

      function renderItem(item) {
        return `<article class="result-item">
          <h3>${item.title} <span class="meta">${item.match_score} 分</span></h3>
          <p>${item.reason}</p>
          <p class="meta">平台：${item.platforms.join("、") || "未提供"} ｜ 标签：${item.tags.join("、") || "未提供"}</p>
          <p class="meta">适合：${item.suitable_for}</p>
          <p class="meta">注意：${item.possible_drawbacks || "暂无"}</p>
        </article>`;
      }

      refreshKeyPreview();
    </script>
  </body>
</html>
